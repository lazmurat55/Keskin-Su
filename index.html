<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keskin Su Sipariş Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0077b6;
            --success: #25D366;
            --bg: #f8fafc;
            --card: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .order-card {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        .brand {
            text-align: center;
            margin-bottom: 25px;
        }

        .brand h1 {
            color: var(--primary);
            font-size: 24px;
            margin: 0;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        .type-selector {
            display: flex;
            background: #f1f5f9;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .type-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            color: #64748b;
            background: transparent;
        }

        .type-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            box-sizing: border-box;
            transition: 0.2s;
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
            outline: none;
        }

        .qty-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f8fafc;
            padding: 10px;
            border-radius: 12px;
            justify-content: space-between;
            border: 1px solid #e2e8f0;
        }

        .qty-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        #qtyDisplay {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .info-text {
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="order-card">
    <div class="brand">
        <h1>💧 KESKİN SU</h1>
        <p style="margin-top: 5px; color: #64748b; font-size: 14px;">Hızlı Sipariş Paneli</p>
    </div>

    <div class="type-selector">
        <button id="btnOld" class="type-btn active" onclick="setMode('old')">Kayıtlıyım</button>
        <button id="btnNew" class="type-btn" onclick="setMode('new')">Yeni Müşteri</button>
    </div>

    <div id="formContent">
        <div id="oldFields">
            <div class="form-group">
                <label>Adınız Soyadınız</label>
                <input type="text" id="custName" placeholder="Örn: Ahmet Yılmaz">
            </div>
        </div>

        <div id="newFields" style="display:none;">
            <div class="form-group">
                <label>Adınız Soyadınız</label>
                <input type="text" id="newName" placeholder="Ad Soyad">
            </div>
            <div class="form-group">
                <label>Açık Adresiniz</label>
                <textarea id="newAddress" rows="3" placeholder="Mahalle, Sokak, No, Daire..."></textarea>
            </div>
        </div>

        <div class="form-group">
            <label>Sipariş Adedi</label>
            <div class="qty-container">
                <button class="qty-btn" onclick="changeQty(-1)">-</button>
                <span id="qtyDisplay">1</span>
                <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
        </div>

        <button class="submit-btn" onclick="sendOrder()">
            Siparişi Tamamla
        </button>
    </div>

    <div class="info-text">
        Keskin Su güvencesiyle kapınızda.
    </div>
</div>

<script>
    let mode = 'old';
    let quantity = 1;

    function setMode(m) {
        mode = m;
        document.getElementById('btnOld').classList.toggle('active', m === 'old');
        document.getElementById('btnNew').classList.toggle('active', m === 'new');
        document.getElementById('oldFields').style.display = m === 'old' ? 'block' : 'none';
        document.getElementById('newFields').style.display = m === 'new' ? 'block' : 'none';
    }

    function changeQty(val) {
        quantity += val;
        if (quantity < 1) quantity = 1;
        document.getElementById('qtyDisplay').innerText = quantity;
    }

    function sendOrder() {
        const myPhone = "905366455131"; 
        let message = "";

        if (mode === 'old') {
            const name = document.getElementById('custName').value;
            if (!name) return alert("Lütfen adınızı girin.");
            message = `*KESKİN SU SİPARİŞİ*\n` +
                      `--------------------------\n` +
                      `👤 *Müşteri:* ${name} (Kayıtlı)\n` +
                      `📦 *Adet:* ${quantity} Damacana\n` +
                      `--------------------------\n` +
                      `Lütfen kayıtlı adresime getirin.`;
        } else {
            const name = document.getElementById('newName').value;
            const address = document.getElementById('newAddress').value;
            if (!name || !address) return alert("Lütfen bilgileri eksiksiz girin.");
            message = `*KESKİN SU SİPARİŞİ (YENİ)*\n` +
                      `--------------------------\n` +
                      `👤 *Müşteri:* ${name}\n` +
                      `📍 *Adres:* ${address}\n` +
                      `📦 *Adet:* ${quantity} Damacana\n` +
                      `--------------------------`;
        }

        const url = `https://wa.me/${myPhone}?text=${encodeURIComponent(message)}`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
