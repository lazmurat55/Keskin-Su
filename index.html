<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Keskin Su Sipariş Paneli</title>
    
    <!-- Mobil Uygulama (PWA) Meta Etiketleri -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Keskin Su">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3105/3105807.png">
    <meta name="mobile-web-app-capable" content="yes">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0077b6;
            --success: #25D366;
            --bg: #f8fafc;
            --card: #ffffff;
        }

        /* Sayfanın telefonda kaymasını engellemek için */
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .order-card {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        .brand { text-align: center; margin-bottom: 20px; }
        .brand h1 { color: var(--primary); font-size: 24px; margin: 0; font-weight: 800; text-transform: uppercase; }

        .type-selector { display: flex; background: #f1f5f9; padding: 5px; border-radius: 12px; margin-bottom: 20px; }
        .type-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; color: #64748b; background: transparent; }
        .type-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 5px; }

        input, textarea { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 16px; box-sizing: border-box; font-family: inherit; }
        input:focus { border-color: var(--primary); outline: none; }

        .qty-container { display: flex; align-items: center; gap: 15px; background: #f8fafc; padding: 8px; border-radius: 12px; justify-content: space-between; border: 1px solid #e2e8f0; }
        .qty-btn { width: 45px; height: 45px; border-radius: 10px; border: none; background: var(--primary); color: white; font-size: 24px; cursor: pointer; }
        #qtyDisplay { font-size: 22px; font-weight: 800; color: var(--primary); }

        .submit-btn { width: 100%; padding: 16px; background: var(--success); color: white; border: none; border-radius: 14px; font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .footer-note { text-align: center; font-size: 11px; color: #94a3b8; margin-top: 15px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="order-card">
    <div class="brand">
        <h1>💧 KESKİN SU</h1>
        <p style="margin: 5px 0 0; color: #64748b; font-size: 13px;">Hızlı Sipariş Paneli</p>
    </div>

    <div class="type-selector">
        <button id="btnOld" class="type-btn active" onclick="setMode('old')">Kayıtlıyım</button>
        <button id="btnNew" class="type-btn" onclick="setMode('new')">Yeni Müşteri</button>
    </div>

    <div id="formContent">
        <div id="oldFields">
            <div class="form-group">
                <label>Adınız Soyadınız</label>
                <input type="text" id="custName" placeholder="Ad Soyad giriniz">
            </div>
        </div>

        <div id="newFields" style="display:none;">
            <div class="form-group">
                <label>Adınız Soyadınız</label>
                <input type="text" id="newName" placeholder="Ad Soyad">
            </div>
            <div class="form-group">
                <label>Açık Adresiniz</label>
                <textarea id="newAddress" rows="2" placeholder="Mahalle, Sokak, No..."></textarea>
            </div>
        </div>

        <div class="form-group">
            <label>Damacana Adedi</label>
            <div class="qty-container">
                <button class="qty-btn" onclick="changeQty(-1)">-</button>
                <span id="qtyDisplay">1</span>
                <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
        </div>

        <button class="submit-btn" onclick="sendOrder()">
            SİPARİŞ VER
        </button>
    </div>

    <div class="footer-note">
        Siparişinizi tamamlamak için WhatsApp'a yönlendirileceksiniz.<br>
        <b>Keskin Su © 2024</b>
    </div>
</div>

<script>
    let mode = 'old';
    let quantity = 1;

    function setMode(m) {
        mode = m;
        document.getElementById('btnOld').classList.toggle('active', m === 'old');
        document.getElementById('btnNew').classList.toggle('active', m === 'new');
        document.getElementById('oldFields').style.display = m === 'old' ? 'block' : 'none';
        document.getElementById('newFields').style.display = m === 'new' ? 'block' : 'none';
    }

    function changeQty(val) {
        quantity += val;
        if (quantity < 1) quantity = 1;
        document.getElementById('qtyDisplay').innerText = quantity;
    }

    function sendOrder() {
        const myPhone = "905366455131"; 
        let message = "";

        if (mode === 'old') {
            const name = document.getElementById('custName').value;
            if (!name) return alert("Lütfen adınızı girin.");
            message = `*KESKİN SU SİPARİŞİ*\n` +
                      `👤 *Müşteri:* ${name} (Kayıtlı)\n` +
                      `📦 *Adet:* ${quantity} Damacana\n` +
                      `📍 *Adres:* Kayıtlı Adres`;
        } else {
            const name = document.getElementById('newName').value;
            const address = document.getElementById('newAddress').value;
            if (!name || !address) return alert("Lütfen bilgileri doldurun.");
            message = `*KESKİN SU (YENİ MÜŞTERİ)*\n` +
                      `👤 *Müşteri:* ${name}\n` +
                      `📍 *Adres:* ${address}\n` +
                      `📦 *Adet:* ${quantity} Damacana`;
        }

        window.open(`https://wa.me/${myPhone}?text=${encodeURIComponent(message)}`, '_blank');
    }
</script>

</body>
</html>
