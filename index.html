<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Su Sipariş Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0077b6;
            --secondary: #00b4d8;
            --success: #25D366;
            --bg: #f0f2f5;
            --text: #1d1d1f;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--primary);
            font-size: 24px;
            margin: 0;
            text-transform: uppercase;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #e4e6eb;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
            color: #444;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .btn-send {
            width: 100%;
            padding: 15px;
            background-color: var(--success);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-send:active {
            transform: scale(0.98);
        }

        .footer-info {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>💧 Su Sipariş Paneli</h1>
    </div>

    <div class="tabs">
        <button id="tabOld" class="tab-btn active" onclick="switchTab('old')">Kayıtlı</button>
        <button id="tabNew" class="tab-btn" onclick="switchTab('new')">Yeni Müşteri</button>
    </div>

    <!-- KAYITLI MÜŞTERİ PANELİ -->
    <div id="panelOld">
        <label>Müşteri Seçin</label>
        <select id="regCustomer">
            <option value="" data-address="">-- Seçiniz --</option>
            <option value="Ahmet Yılmaz" data-address="Atatürk Mah. 45. Sokak No:12">Ahmet Yılmaz (Merkez)</option>
            <option value="Mehmet Demir" data-address="Yavuz Selim Cad. Gül Apt. Kat:2">Mehmet Demir (Çarşı)</option>
            <option value="Ayşe Su" data-address="Lale Sitesi B Blok D:4">Ayşe Su (Konutlar)</option>
        </select>
        
        <label>Adet (Damacana)</label>
        <input type="number" id="regQty" value="1" min="1">
    </div>

    <!-- YENİ MÜŞTERİ PANELİ -->
    <div id="panelNew" style="display:none;">
        <label>Müşteri Ad Soyad</label>
        <input type="text" id="newName" placeholder="Ad Soyad">
        
        <label>Telefon</label>
        <input type="tel" id="newPhone" placeholder="05xx xxx xx xx">
        
        <label>Adres</label>
        <textarea id="newAddress" rows="3" placeholder="Mahalle, Sokak, Daire..."></textarea>
        
        <label>Adet</label>
        <input type="number" id="newQty" value="1" min="1">
    </div>

    <button class="btn-send" onclick="sendToWhatsApp()">
        Siparişi WhatsApp'a Gönder
    </button>

    <div class="footer-info">
        Hedef Numara: +90 536 645 51 31
    </div>
</div>

<script>
    let currentTab = 'old';

    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('panelOld').style.display = tab === 'old' ? 'block' : 'none';
        document.getElementById('panelNew').style.display = tab === 'new' ? 'block' : 'none';
        document.getElementById('tabOld').className = tab === 'old' ? 'tab-btn active' : 'tab-btn';
        document.getElementById('tabNew').className = tab === 'new' ? 'tab-btn active' : 'tab-btn';
    }

    function sendToWhatsApp() {
        const targetNumber = "905366455131";
        let message = "";

        if (currentTab === 'old') {
            const select = document.getElementById('regCustomer');
            const name = select.value;
            const address = select.options[select.selectedIndex].getAttribute('data-address');
            const qty = document.getElementById('regQty').value;

            if (!name) { alert("Lütfen müşteri seçin!"); return; }

            message = `💧 *YENİ SU SİPARİŞİ (Kayıtlı)*\n` +
                      `--------------------------\n` +
                      `👤 *Müşteri:* ${name}\n` +
                      `📍 *Adres:* ${address}\n` +
                      `📦 *Adet:* ${qty} Damacana\n` +
                      `--------------------------`;
        } else {
            const name = document.getElementById('newName').value;
            const phone = document.getElementById('newPhone').value;
            const address = document.getElementById('newAddress').value;
            const qty = document.getElementById('newQty').value;

            if (!name || !address) { alert("Lütfen isim ve adres girin!"); return; }

            message = `💧 *YENİ MÜŞTERİ SİPARİŞİ*\n` +
                      `--------------------------\n` +
                      `👤 *Müşteri:* ${name}\n` +
                      `📞 *Tel:* ${phone}\n` +
                      `📍 *Adres:* ${address}\n` +
                      `📦 *Adet:* ${qty} Damacana\n` +
                      `--------------------------`;
        }

        const waUrl = `https://wa.me/${targetNumber}?text=${encodeURIComponent(message)}`;
        window.open(waUrl, '_blank');
    }
</script>

</body>
</html>
